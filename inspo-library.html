<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InspoLib – SumanTV</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg:#0d0d0f;--surface:#141416;--surface2:#1c1c20;--surface3:#242428;
    --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
    --text:#f0f0f2;--text2:#9090a0;--text3:#5a5a6a;
    --accent:#c8f060;--accent2:#a8d040;--accent-dim:rgba(200,240,96,0.12);
    --radius:12px;--radius-sm:8px;--radius-lg:18px;
    --font-head:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;overflow:hidden;}
  body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;display:flex;flex-direction:column;height:100vh;}

  .auth-screen{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg);}
  .auth-box{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:36px 32px;width:100%;max-width:400px;display:flex;flex-direction:column;gap:20px;}
  .auth-logo{font-family:var(--font-head);font-size:24px;font-weight:800;color:var(--accent);letter-spacing:-0.5px;}
  .auth-logo span{color:var(--text);}
  .auth-sub{font-size:13px;color:var(--text2);margin-top:-12px;line-height:1.5;}
  .auth-tabs{display:flex;gap:4px;background:var(--surface2);border-radius:var(--radius-sm);padding:3px;}
  .auth-tab{flex:1;padding:7px;border:none;background:transparent;color:var(--text2);font-family:var(--font-body);font-size:13px;border-radius:6px;cursor:pointer;transition:all 0.15s;}
  .auth-tab.active{background:var(--surface3);color:var(--text);}
  .auth-form{display:flex;flex-direction:column;gap:12px;}
  .auth-form input{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text);font-family:var(--font-body);font-size:13px;outline:none;transition:border-color 0.2s;width:100%;}
  .auth-form input:focus{border-color:var(--accent);}
  .auth-form input::placeholder{color:var(--text3);}
  .btn-auth{background:var(--accent);color:#0d0d0f;border:none;border-radius:var(--radius-sm);padding:11px;font-family:var(--font-head);font-size:13px;font-weight:700;cursor:pointer;transition:background 0.15s;}
  .btn-auth:hover{background:var(--accent2);}
  .auth-msg{font-size:12px;padding:8px 12px;border-radius:var(--radius-sm);display:none;}
  .auth-msg.show{display:block;}
  .auth-msg.err{color:#f87171;background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.2);}
  .auth-msg.ok{color:#34d399;background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.2);}

  .topbar{display:flex;align-items:center;gap:16px;padding:0 24px;height:58px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;z-index:100;}
  .logo{font-family:var(--font-head);font-size:18px;font-weight:800;color:var(--accent);letter-spacing:-0.5px;white-space:nowrap;}
  .logo span{color:var(--text);}
  .search-wrap{flex:1;max-width:380px;position:relative;}
  .search-wrap input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:8px 14px 8px 36px;color:var(--text);font-family:var(--font-body);font-size:13px;outline:none;transition:border-color 0.2s;}
  .search-wrap input::placeholder{color:var(--text3);}
  .search-wrap input:focus{border-color:var(--accent);}
  .search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none;}
  .topbar-right{margin-left:auto;display:flex;gap:10px;align-items:center;flex-shrink:0;}
  .count-badge{background:var(--accent-dim);color:var(--accent);border-radius:6px;padding:3px 10px;font-size:12px;font-weight:500;font-family:var(--font-head);}
  .rt-badge{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);}
  .rt-dot{width:7px;height:7px;border-radius:50%;background:#34d399;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  .user-pill{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border2);border-radius:20px;padding:4px 12px 4px 6px;}
  .user-avatar{width:24px;height:24px;border-radius:50%;background:var(--accent-dim);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:var(--font-head);}
  .user-name{font-size:12px;color:var(--text2);}
  .btn-signout{background:transparent;border:1px solid var(--border2);color:var(--text3);border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;font-family:var(--font-body);transition:all 0.15s;}
  .btn-signout:hover{border-color:var(--text3);color:var(--text);}
  .btn-add{background:var(--accent);color:#0d0d0f;border:none;border-radius:var(--radius-sm);padding:8px 16px;font-family:var(--font-head);font-size:13px;font-weight:700;cursor:pointer;transition:background 0.15s,transform 0.1s;white-space:nowrap;}
  .btn-add:hover{background:var(--accent2);}
  .btn-add:active{transform:scale(0.97);}

  .layout{display:flex;flex:1;overflow:hidden;}

  .sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:20px 0;display:flex;flex-direction:column;gap:8px;}
  .sidebar::-webkit-scrollbar{width:4px;}
  .sidebar::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px;}
  .sidebar-section{padding:0 16px;margin-bottom:6px;}
  .sidebar-label{font-size:10px;font-weight:700;letter-spacing:0.1em;color:var(--text3);text-transform:uppercase;padding:0 4px;margin-bottom:6px;font-family:var(--font-head);}
  .filter-btn{display:flex;align-items:center;gap:9px;width:100%;background:transparent;border:none;padding:7px 8px;border-radius:var(--radius-sm);color:var(--text2);font-family:var(--font-body);font-size:13px;cursor:pointer;text-align:left;transition:background 0.15s,color 0.15s;}
  .filter-btn:hover{background:var(--surface2);color:var(--text);}
  .filter-btn.active{background:var(--accent-dim);color:var(--accent);}
  .filter-btn .ficon{font-size:15px;width:20px;text-align:center;}
  .filter-btn .fname{flex:1;}
  .filter-btn .fcount{font-size:11px;color:var(--text3);background:var(--surface3);border-radius:4px;padding:1px 6px;font-family:var(--font-head);}
  .filter-btn.active .fcount{background:var(--accent-dim);color:var(--accent);}
  .sidebar-divider{height:1px;background:var(--border);margin:4px 16px;}

  .main{flex:1;overflow-y:auto;padding:24px;background:var(--bg);}
  .main::-webkit-scrollbar{width:4px;}
  .main::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:2px;}
  .toolbar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
  .sort-select{background:var(--surface);border:1px solid var(--border2);color:var(--text2);font-family:var(--font-body);font-size:12px;border-radius:var(--radius-sm);padding:6px 10px;outline:none;cursor:pointer;}
  .view-toggle{display:flex;gap:4px;margin-left:auto;}
  .view-btn{background:var(--surface);border:1px solid var(--border);color:var(--text3);border-radius:6px;padding:6px 10px;cursor:pointer;font-size:13px;transition:all 0.15s;}
  .view-btn.active,.view-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
  .active-filters{display:flex;gap:6px;flex-wrap:wrap;}
  .af-chip{display:flex;align-items:center;gap:4px;background:var(--surface2);border:1px solid var(--border2);color:var(--text2);border-radius:20px;padding:4px 10px;font-size:11px;}
  .af-chip button{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;line-height:1;padding:0;}

  .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
  .card-grid.list-view{grid-template-columns:1fr;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;transition:border-color 0.2s,transform 0.15s;display:flex;flex-direction:column;position:relative;}
  .card:hover{border-color:var(--border2);transform:translateY(-2px);}
  .card.list-view{flex-direction:row;height:84px;}
  .card-thumb{height:140px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:36px;position:relative;overflow:hidden;}
  .card.list-view .card-thumb{width:84px;height:84px;}
  .thumb-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(0,0,0,0.5));}
  .card-body{padding:12px 14px;flex:1;display:flex;flex-direction:column;gap:6px;}
  .card.list-view .card-body{padding:10px 14px;justify-content:center;}
  .card-title{font-family:var(--font-head);font-size:14px;font-weight:600;color:var(--text);line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .card.list-view .card-title{-webkit-line-clamp:1;font-size:13px;}
  .card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .source-badge{font-size:10px;font-weight:700;font-family:var(--font-head);padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:0.06em;}
  .cat-badge{font-size:11px;padding:2px 8px;border-radius:10px;color:var(--text2);background:var(--surface2);border:1px solid var(--border);}
  .by-badge{font-size:10px;color:var(--text3);margin-left:auto;white-space:nowrap;}
  .card-notes{font-size:11px;color:var(--text3);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .card-footer{display:flex;align-items:center;gap:8px;padding:8px 14px;border-top:1px solid var(--border);flex-shrink:0;}
  .card.list-view .card-footer{display:none;}
  .card-url{font-size:11px;color:var(--text3);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .bookmark-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:2px;line-height:1;transition:color 0.15s,transform 0.1s;}
  .bookmark-btn:hover{color:var(--accent);transform:scale(1.2);}
  .bookmark-btn.bookmarked{color:var(--accent);}
  .delete-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:2px;transition:color 0.15s;}
  .delete-btn:hover{color:#ff5555;}

  .src-article{background:rgba(52,211,153,0.15);color:#34d399;}
  .src-ytchannel{background:rgba(248,113,113,0.15);color:#f87171;}
  .src-ytvideo{background:rgba(248,113,113,0.15);color:#f87171;}
  .src-twitter{background:rgba(96,165,250,0.15);color:#60a5fa;}
  .src-reddit{background:rgba(251,146,60,0.15);color:#fb923c;}
  .src-instagram{background:rgba(232,121,249,0.15);color:#e879f9;}
  .src-trend{background:rgba(200,240,96,0.15);color:#c8f060;}
  .thumb-article{background:#0d2e20;}.thumb-ytchannel{background:#2e0d0d;}.thumb-ytvideo{background:#2e0d0d;}
  .thumb-twitter{background:#0d1e2e;}.thumb-reddit{background:#2e1a0d;}.thumb-instagram{background:#2e0d2e;}.thumb-trend{background:#1e2e0d;}

  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:80px 20px;text-align:center;color:var(--text3);grid-column:1/-1;}
  .empty-state .e-icon{font-size:48px;opacity:0.4;}
  .empty-state h3{font-family:var(--font-head);font-size:18px;color:var(--text2);}
  .empty-state p{font-size:13px;max-width:280px;line-height:1.6;}
  .empty-state button{margin-top:8px;background:var(--accent);color:#0d0d0f;border:none;border-radius:var(--radius-sm);padding:10px 20px;font-family:var(--font-head);font-weight:700;font-size:13px;cursor:pointer;}
  .loading-wrap{display:flex;align-items:center;justify-content:center;gap:10px;padding:60px;color:var(--text3);font-size:13px;grid-column:1/-1;}
  .spin{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}

  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);z-index:1000;align-items:center;justify-content:center;padding:20px;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);width:100%;max-width:540px;max-height:90vh;overflow-y:auto;padding:28px;display:flex;flex-direction:column;gap:20px;}
  .modal::-webkit-scrollbar{width:4px;}
  .modal-header{display:flex;align-items:center;justify-content:space-between;}
  .modal-title{font-family:var(--font-head);font-size:18px;font-weight:700;}
  .modal-close{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;line-height:1;padding:4px;transition:color 0.15s;}
  .modal-close:hover{color:var(--text);}
  .form-row{display:flex;flex-direction:column;gap:6px;}
  .form-row label{font-size:12px;color:var(--text2);font-weight:500;letter-spacing:0.04em;}
  .form-row input,.form-row select,.form-row textarea{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text);font-family:var(--font-body);font-size:13px;outline:none;transition:border-color 0.2s;width:100%;}
  .form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--accent);}
  .form-row textarea{resize:vertical;min-height:70px;}
  .form-row select option{background:var(--surface2);}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .form-actions{display:flex;gap:10px;justify-content:flex-end;}
  .btn-cancel{background:transparent;border:1px solid var(--border2);color:var(--text2);border-radius:var(--radius-sm);padding:10px 20px;font-family:var(--font-body);font-size:13px;cursor:pointer;transition:all 0.15s;}
  .btn-cancel:hover{border-color:var(--text2);color:var(--text);}
  .btn-save{background:var(--accent);color:#0d0d0f;border:none;border-radius:var(--radius-sm);padding:10px 24px;font-family:var(--font-head);font-size:13px;font-weight:700;cursor:pointer;transition:background 0.15s;}
  .btn-save:hover{background:var(--accent2);}

  .detail-panel{width:340px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;transform:translateX(100%);transition:transform 0.25s cubic-bezier(0.16,1,0.3,1);}
  .detail-panel.open{transform:translateX(0);}
  .dp-header{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .dp-title{font-family:var(--font-head);font-size:14px;font-weight:700;}
  .dp-close{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;}
  .dp-body{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:16px;}
  .dp-body::-webkit-scrollbar{width:4px;}
  .dp-thumb{height:200px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:56px;overflow:hidden;position:relative;background:#000;}
  .dp-thumb.has-video{height:auto;aspect-ratio:16/9;min-height:190px;}
  .yt-iframe{width:100%;height:100%;border:none;display:block;position:absolute;inset:0;}
  .dp-name{font-family:var(--font-head);font-size:16px;font-weight:700;line-height:1.35;}
  .dp-badges{display:flex;gap:6px;flex-wrap:wrap;}
  .dp-meta{display:flex;flex-direction:column;gap:6px;}
  .dp-meta-row{display:flex;gap:8px;}
  .dp-meta-label{font-size:11px;color:var(--text3);width:70px;flex-shrink:0;}
  .dp-meta-val{font-size:12px;color:var(--text2);flex:1;word-break:break-all;}
  .dp-notes-label{font-size:11px;color:var(--text3);margin-bottom:4px;}
  .dp-notes{font-size:12px;color:var(--text2);line-height:1.6;}
  .dp-actions{display:flex;flex-direction:column;gap:8px;margin-top:auto;padding-top:12px;border-top:1px solid var(--border);}
  .dp-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px;border-radius:var(--radius-sm);font-family:var(--font-body);font-size:13px;cursor:pointer;text-decoration:none;transition:all 0.15s;}
  .dp-btn.primary{background:var(--accent);color:#0d0d0f;border:none;font-weight:600;}
  .dp-btn.primary:hover{background:var(--accent2);}
  .dp-btn.secondary{background:transparent;border:1px solid var(--border2);color:var(--text2);}
  .dp-btn.secondary:hover{background:var(--surface2);}
  .dp-btn.danger{background:transparent;border:1px solid rgba(255,85,85,0.3);color:#ff5555;}
  .dp-btn.danger:hover{background:rgba(255,85,85,0.1);}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--surface3);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:10px 20px;font-size:13px;z-index:2000;transition:transform 0.3s cubic-bezier(0.16,1,0.3,1);pointer-events:none;}
  .toast.show{transform:translateX(-50%) translateY(0);}
  .io-row{display:flex;gap:8px;}
  .io-btn{flex:1;background:var(--surface2);border:1px solid var(--border2);color:var(--text2);border-radius:var(--radius-sm);padding:8px;font-size:12px;cursor:pointer;font-family:var(--font-body);transition:all 0.15s;text-align:center;}
  .io-btn:hover{border-color:var(--accent);color:var(--accent);}

  @media(max-width:768px){.sidebar{display:none;}.detail-panel{position:fixed;inset:0;width:100%;z-index:500;transform:translateX(100%);}.card-grid{grid-template-columns:1fr 1fr;}}
  @media(max-width:480px){.card-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<!-- AUTH -->
<div class="auth-screen" id="authScreen">
  <div class="auth-box">
    <div class="auth-logo">INSPO<span>LIB</span></div>
    <div class="auth-sub">SumanTV Content Team · Sign in to access the shared library</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabSignin" onclick="switchTab('signin')">Sign In</button>
      <button class="auth-tab" id="tabSignup" onclick="switchTab('signup')">Sign Up</button>
    </div>
    <div class="auth-form">
      <input type="text" id="authName" placeholder="Your name (e.g. Varma)" style="display:none">
      <input type="email" id="authEmail" placeholder="your@email.com" autocomplete="email">
      <input type="password" id="authPassword" placeholder="Password (min 6 chars)" autocomplete="current-password">
      <div class="auth-msg" id="authMsg"></div>
      <button class="btn-auth" id="authBtn" onclick="handleAuth()">Sign In</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="appShell" style="display:none;flex-direction:column;height:100vh;">
  <header class="topbar">
    <div class="logo">INSPO<span>LIB</span></div>
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="searchInput" placeholder="Search titles, notes, URLs…">
    </div>
    <div class="topbar-right">
      <div class="rt-badge"><span class="rt-dot"></span><span>Live</span></div>
      <span class="count-badge" id="totalCount">0 items</span>
      <div class="user-pill">
        <div class="user-avatar" id="userAvatar">?</div>
        <span class="user-name" id="userName">…</span>
      </div>
      <button class="btn-signout" onclick="signOut()">Sign out</button>
      <button class="btn-add" id="openAddModal">+ Add Item</button>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Browse</div>
        <button class="filter-btn active" data-filter="all" data-type="all"><span class="ficon">◈</span><span class="fname">All Items</span><span class="fcount" id="fc-all">0</span></button>
        <button class="filter-btn" data-filter="bookmarked" data-type="all"><span class="ficon">★</span><span class="fname">Bookmarks</span><span class="fcount" id="fc-bm">0</span></button>
        <button class="filter-btn" data-filter="mine" data-type="all"><span class="ficon">◎</span><span class="fname">Added by me</span><span class="fcount" id="fc-mine">0</span></button>
      </div>
      <div class="sidebar-divider"></div>
      <div class="sidebar-section">
        <div class="sidebar-label">Sources</div>
        <button class="filter-btn" data-filter="article" data-type="source"><span class="ficon">◉</span><span class="fname">Articles</span><span class="fcount" id="fc-article">0</span></button>
        <button class="filter-btn" data-filter="ytchannel" data-type="source"><span class="ficon">▶</span><span class="fname">YT Channels</span><span class="fcount" id="fc-ytchannel">0</span></button>
        <button class="filter-btn" data-filter="ytvideo" data-type="source"><span class="ficon">▷</span><span class="fname">YT Videos</span><span class="fcount" id="fc-ytvideo">0</span></button>

<script>
const SB_URL='https://incqkcjqfhmnaguaccfl.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImluY3FrY2pxZmhtbmFndWFjY2ZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3ODE0NDIsImV4cCI6MjA5MTM1NzQ0Mn0.G-j9UqRCXGwdsyCWlUCY5q-iw0BdTY4LSp-dXB_8qnA';
const sb=supabase.createClient(SB_URL,SB_KEY);

let items=[],currentUser=null,currentFilter={type:'all',value:'all'},searchQuery='',sortMode='newest',viewMode='grid',editingId=null,detailId=null,authMode='signin';

const SI={
  article:{label:'Article',icon:'◉',cls:'src-article',tc:'thumb-article'},
  ytchannel:{label:'YT Channel',icon:'▶',cls:'src-ytchannel',tc:'thumb-ytchannel'},
  ytvideo:{label:'YT Video',icon:'▷',cls:'src-ytvideo',tc:'thumb-ytvideo'},
  twitter:{label:'Twitter',icon:'✕',cls:'src-twitter',tc:'thumb-twitter'},
  reddit:{label:'Reddit',icon:'◈',cls:'src-reddit',tc:'thumb-reddit'},
  instagram:{label:'Instagram',icon:'⬡',cls:'src-instagram',tc:'thumb-instagram'},
  trend:{label:'Trend',icon:'↑',cls:'src-trend',tc:'thumb-trend'},
};

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function uid(){return([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g,c=>(c^crypto.getRandomValues(new Uint8Array(1))[0]&15>>c/4).toString(16));}
function getYTId(url){const m=url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([a-zA-Z0-9_-]{11})/);return m?m[1]:null;}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}

/* AUTH */
function switchTab(mode){
  authMode=mode;
  document.getElementById('tabSignin').classList.toggle('active',mode==='signin');
  document.getElementById('tabSignup').classList.toggle('active',mode==='signup');
  document.getElementById('authBtn').textContent=mode==='signin'?'Sign In':'Create Account';
  document.getElementById('authName').style.display=mode==='signup'?'block':'none';
  document.getElementById('authMsg').classList.remove('show','err','ok');
}

function showAuthMsg(msg,type='err'){
  const el=document.getElementById('authMsg');
  el.textContent=msg;el.className='auth-msg show '+type;
}

async function handleAuth(){
  const email=document.getElementById('authEmail').value.trim();
  const pass=document.getElementById('authPassword').value;
  const name=document.getElementById('authName').value.trim();
  if(!email||!pass){showAuthMsg('Please enter email and password.');return;}
  document.getElementById('authBtn').textContent='…';
  if(authMode==='signup'){
    if(!name){showAuthMsg('Please enter your name.');document.getElementById('authBtn').textContent='Create Account';return;}
    const{error}=await sb.auth.signUp({email,password:pass,options:{data:{full_name:name}}});
    if(error){showAuthMsg(error.message);document.getElementById('authBtn').textContent='Create Account';return;}
    showAuthMsg('Account created! Check your email to confirm, then sign in.','ok');
    document.getElementById('authBtn').textContent='Create Account';
  } else {
    const{error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error){showAuthMsg(error.message);document.getElementById('authBtn').textContent='Sign In';return;}
  }
}

async function signOut(){
  await sb.auth.signOut();
  currentUser=null;items=[];
  document.getElementById('appShell').style.display='none';
  document.getElementById('authScreen').style.display='flex';
}

/* INIT */
async function initApp(user){
  currentUser=user;
  document.getElementById('authScreen').style.display='none';
  document.getElementById('appShell').style.display='flex';
  const name=user.user_metadata?.full_name||user.email.split('@')[0];
  document.getElementById('userName').textContent=name;
  document.getElementById('userAvatar').textContent=name.charAt(0).toUpperCase();
  await fetchItems();
  subscribeRealtime();
  bindEvents();
}

/* DATA */
async function fetchItems(){
  document.getElementById('cardGrid').innerHTML='<div class="loading-wrap"><div class="spin"></div>Loading library…</div>';
  const{data,error}=await sb.from('items').select('*').order('created_at',{ascending:false});
  if(error){showToast('Load error: '+error.message);document.getElementById('cardGrid').innerHTML='<div class="loading-wrap">Failed to load. Check console.</div>';return;}
  items=data||[];
  updateCounts();renderCards();
}

async function dbInsert(item){
  const{data,error}=await sb.from('items').insert([item]).select().single();
  if(error){showToast('Save error: '+error.message);return null;}
  return data;
}
async function dbUpdate(id,changes){const{error}=await sb.from('items').update(changes).eq('id',id);if(error)showToast('Update error: '+error.message);}
async function dbDelete(id){const{error}=await sb.from('items').delete().eq('id',id);if(error)showToast('Delete error: '+error.message);}

/* REALTIME */
function subscribeRealtime(){
  sb.channel('items_realtime').on('postgres_changes',{event:'*',schema:'public',table:'items'},p=>{
    if(p.eventType==='INSERT'){
      if(!items.find(i=>i.id===p.new.id)){items.unshift(p.new);updateCounts();renderCards();if(p.new.added_by!==currentUser.email)showToast('✦ New item added by team');}
    } else if(p.eventType==='UPDATE'){
      const idx=items.findIndex(i=>i.id===p.new.id);
      if(idx!==-1){items[idx]=p.new;updateCounts();renderCards();if(detailId===p.new.id)openDetail(p.new.id);}
    } else if(p.eventType==='DELETE'){
      items=items.filter(i=>i.id!==p.old.id);updateCounts();renderCards();if(detailId===p.old.id)closeDetail();
    }
  }).subscribe();
}

/* COUNTS & RENDER */
function updateCounts(){
  document.getElementById('fc-all').textContent=items.length;
  document.getElementById('fc-bm').textContent=items.filter(i=>i.bookmarked).length;
  document.getElementById('fc-mine').textContent=items.filter(i=>i.added_by===currentUser?.email).length;
  ['article','ytchannel','ytvideo','twitter','reddit','instagram','trend'].forEach(s=>{const el=document.getElementById('fc-'+s);if(el)el.textContent=items.filter(i=>i.source===s).length;});
  ['Entertainment','Education','Health','Politics','Sports','Technology','AI','Trending','Food','Travel','DIY','Motivational Stories','Devotional Stories','Learn'].forEach(c=>{const el=document.getElementById('fc-'+c);if(el)el.textContent=items.filter(i=>i.category===c).length;});
  document.getElementById('totalCount').textContent=items.length+' item'+(items.length===1?'':'s');
}

function getFiltered(){
  let list=[...items];
  if(currentFilter.value==='bookmarked')list=list.filter(i=>i.bookmarked);
  else if(currentFilter.value==='mine')list=list.filter(i=>i.added_by===currentUser?.email);
  else if(currentFilter.type==='source')list=list.filter(i=>i.source===currentFilter.value);
  else if(currentFilter.type==='category')list=list.filter(i=>i.category===currentFilter.value);
  if(searchQuery){const q=searchQuery.toLowerCase();list=list.filter(i=>i.title.toLowerCase().includes(q)||(i.notes||'').toLowerCase().includes(q)||i.url.toLowerCase().includes(q));}
  if(sortMode==='newest')list.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  else if(sortMode==='oldest')list.sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  else if(sortMode==='alpha')list.sort((a,b)=>a.title.localeCompare(b.title));
  else if(sortMode==='bookmarks')list.sort((a,b)=>(b.bookmarked?1:0)-(a.bookmarked?1:0));
  return list;
}

function renderCards(){
  const grid=document.getElementById('cardGrid');
  const list=getFiltered();
  if(!list.length){grid.innerHTML=`<div class="empty-state"><div class="e-icon">◈</div><h3>Nothing here yet</h3><p>${searchQuery?'No results for "'+esc(searchQuery)+'"':'Be the first to add an item.'}</p>${!searchQuery?'<button onclick="openAdd()">+ Add Item</button>':''}</div>`;return;}
  grid.innerHTML=list.map(it=>cardHTML(it)).join('');
  grid.querySelectorAll('.card').forEach(el=>el.addEventListener('click',e=>{if(e.target.classList.contains('bookmark-btn')||e.target.classList.contains('delete-btn'))return;openDetail(el.dataset.id);}));
  grid.querySelectorAll('.bookmark-btn').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();toggleBookmark(el.dataset.id);}));
  grid.querySelectorAll('.delete-btn').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();deleteItem(el.dataset.id);}));
}

function cardHTML(item){
  const si=SI[item.source]||{label:item.source,icon:'◉',cls:'',tc:''};
  const ytId=(item.source==='ytvideo'||item.source==='ytchannel')?getYTId(item.url):null;
  const tbg=ytId?`background-image:url(https://img.youtube.com/vi/${ytId}/mqdefault.jpg);background-size:cover;background-position:center;`:(item.thumb?`background-image:url(${item.thumb});background-size:cover;background-position:center;`:'');
  const icon=!item.thumb&&!ytId?si.icon:'';
  const lv=viewMode==='list'?' list-view':'';
  const by=item.added_by_name||item.added_by?.split('@')[0]||'';
  return `<div class="card${lv}" data-id="${item.id}">
    <div class="card-thumb ${si.tc}" style="${tbg}">
      ${icon?`<span style="position:relative;z-index:1;font-size:${viewMode==='list'?'22':'36'}px">${icon}</span>`:''}
      ${(item.thumb||ytId)?'<div class="thumb-overlay"></div>':''}
    </div>
    <div class="card-body">
      <div class="card-title">${esc(item.title)}</div>
      <div class="card-meta">
        <span class="source-badge ${si.cls}">${si.label}</span>
        <span class="cat-badge">${esc(item.category)}</span>
        ${by?`<span class="by-badge">by ${esc(by)}</span>`:''}
      </div>
      ${item.notes&&viewMode!=='list'?`<div class="card-notes">${esc(item.notes)}</div>`:''}
    </div>
    <div class="card-footer">
      <span class="card-url">${item.url.replace(/^https?:\/\//,'')}</span>
      <button class="bookmark-btn ${item.bookmarked?'bookmarked':''}" data-id="${item.id}">${item.bookmarked?'★':'☆'}</button>
      <button class="delete-btn" data-id="${item.id}">✕</button>
    </div>
  </div>`;
}

/* ACTIONS */
async function toggleBookmark(id){
  const item=items.find(i=>i.id===id);if(!item)return;
  item.bookmarked=!item.bookmarked;
  renderCards();updateCounts();
  await dbUpdate(id,{bookmarked:item.bookmarked});
  showToast(item.bookmarked?'★ Bookmarked':'Bookmark removed');
}

async function deleteItem(id){
  if(!confirm('Delete this item?'))return;
  items=items.filter(i=>i.id!==id);
  renderCards();updateCounts();
  if(detailId===id)closeDetail();
  await dbDelete(id);
  showToast('Deleted');
}

function openDetail(id){
  const item=items.find(i=>i.id===id);if(!item)return;
  detailId=id;
  const si=SI[item.source]||{label:item.source,icon:'◉',cls:'',tc:''};
  const ytId=item.source==='ytvideo'?getYTId(item.url):null;
  const by=item.added_by_name||item.added_by?.split('@')[0]||'—';
  const isOwner=item.added_by===currentUser?.email;
  const ytBlock=ytId?`<div class="dp-thumb has-video" id="dp-video-wrap">
    <img src="https://img.youtube.com/vi/${ytId}/mqdefault.jpg" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0;cursor:pointer;z-index:2;" onclick="loadYTPlayer('${ytId}')">
    <div onclick="loadYTPlayer('${ytId}')" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:3;cursor:pointer;background:rgba(0,0,0,0.25);">
      <div style="width:62px;height:62px;border-radius:50%;background:rgba(0,0,0,0.8);border:2px solid rgba(255,255,255,0.9);display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;" onmouseover="this.style.background='#ff0000'" onmouseout="this.style.background='rgba(0,0,0,0.8)'">▶</div>
      <div style="margin-top:8px;font-size:12px;color:rgba(255,255,255,0.85);">▶ Play video</div>
    </div></div>`:
  `<div class="dp-thumb ${si.tc}" style="${item.thumb?`background-image:url(${item.thumb});background-size:cover;background-position:center;`:''}">${item.thumb?'':`<span style="position:relative;z-index:1;font-size:52px">${si.icon}</span>`}</div>`;
  document.getElementById('dpBody').innerHTML=`${ytBlock}
    <div class="dp-name">${esc(item.title)}</div>
    <div class="dp-badges">
      <span class="source-badge ${si.cls}">${si.label}</span>
      <span class="cat-badge">${esc(item.category)}</span>
      ${item.bookmarked?'<span class="cat-badge" style="color:#c8f060;border-color:rgba(200,240,96,0.3)">★ Saved</span>':''}
    </div>
    <div class="dp-meta">
      <div class="dp-meta-row"><span class="dp-meta-label">URL</span><span class="dp-meta-val">${esc(item.url)}</span></div>
      <div class="dp-meta-row"><span class="dp-meta-label">Added by</span><span class="dp-meta-val">${esc(by)}</span></div>
      <div class="dp-meta-row"><span class="dp-meta-label">Date</span><span class="dp-meta-val">${new Date(item.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</span></div>
    </div>
    ${item.notes?`<div><div class="dp-notes-label">Notes</div><div class="dp-notes">${esc(item.notes)}</div></div>`:''}
    <div class="dp-actions">
      <a class="dp-btn primary" href="${esc(item.url)}" target="_blank" rel="noopener">↗ Open Link</a>
      ${isOwner?`<button class="dp-btn secondary" onclick="openEdit('${id}')">✎ Edit</button>`:''}
      <button class="dp-btn secondary" onclick="toggleBookmark('${id}');openDetail('${id}')">${item.bookmarked?'☆ Remove Bookmark':'★ Bookmark'}</button>
      ${isOwner?`<button class="dp-btn danger" onclick="deleteItem('${id}')">✕ Delete</button>`:''}
    </div>`;
  document.getElementById('detailPanel').classList.add('open');

function loadYTPlayer(ytId){
  const w=document.getElementById('dp-video-wrap');if(!w)return;
  w.innerHTML=`<iframe class="yt-iframe" src="https://www.youtube.com/embed/${ytId}?autoplay=1&rel=0&modestbranding=1" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture;web-share" allowfullscreen></iframe>`;
}
function closeDetail(){detailId=null;document.getElementById('detailPanel').classList.remove('open');}

function openAdd(){
  editingId=null;
  document.getElementById('modalTitle').textContent='Add New Item';

  document.getElementById('addModal').classList.add('open');
}
function openEdit(id){
  const item=items.find(i=>i.id===id);if(!item)return;
  editingId=id;
  document.getElementById('modalTitle').textContent='Edit Item';
  document.getElementById('f-title').value=item.title;
  document.getElementById('f-url').value=item.url;
  document.getElementById('f-source').value=item.source;
  document.getElementById('f-category').value=item.category;
  document.getElementById('f-thumb').value=item.thumb||'';
  document.getElementById('f-notes').value=item.notes||'';
  document.getElementById('addModal').classList.add('open');
}
function closeModal(){document.getElementById('addModal').classList.remove('open');}

async function saveItem(){
  const title=document.getElementById('f-title').value.trim();
  const url=document.getElementById('f-url').value.trim();
  const source=document.getElementById('f-source').value;
  const category=document.getElementById('f-category').value;
  const thumb=document.getElementById('f-thumb').value.trim();
  const notes=document.getElementById('f-notes').value.trim();
  if(!title||!url||!source||!category){showToast('Fill all required fields');return;}
  const btn=document.getElementById('saveItem');btn.textContent='Saving…';
  if(editingId){
    await dbUpdate(editingId,{title,url,source,category,thumb,notes});
    const idx=items.findIndex(i=>i.id===editingId);
    if(idx!==-1)Object.assign(items[idx],{title,url,source,category,thumb,notes});
    showToast('Item updated');
    if(detailId===editingId)openDetail(editingId);
  } else {
    const name=currentUser.user_metadata?.full_name||currentUser.email.split('@')[0];
    const newItem={id:uid(),title,url,source,category,thumb,notes,bookmarked:false,created_at:new Date().toISOString(),added_by:currentUser.email,added_by_name:name};
    const saved=await dbInsert(newItem);
    if(saved){items.unshift(saved);showToast('Item added!');}
  }
  updateCounts();renderCards();closeModal();
  btn.textContent='Save Item';
}

function setFilter(type,value){
  currentFilter={type,value};
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.filter===value&&(value==='all'||value==='bookmarked'||value==='mine'||b.dataset.type===type)));
  renderActiveFilters();renderCards();
}
function renderActiveFilters(){
  const af=document.getElementById('activeFilters');
  if(currentFilter.value==='all'){af.innerHTML='';return;}
  const lbl=currentFilter.value==='bookmarked'?'★ Bookmarks':currentFilter.value==='mine'?'◎ Added by me':currentFilter.value;
  af.innerHTML=`<div class="af-chip">${esc(lbl)}<button onclick="setFilter('all','all')">✕</button></div>`;
}

function bindEvents(){
  document.getElementById('openAddModal').onclick=openAdd;
  document.getElementById('closeModal').onclick=closeModal;
  document.getElementById('cancelModal').onclick=closeModal;
  document.getElementById('saveItem').onclick=saveItem;
  document.getElementById('dpClose').onclick=closeDetail;
  document.getElementById('exportBtn').onclick=()=>{
    const blob=new Blob([JSON.stringify(items,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download='inspolib-'+new Date().toISOString().slice(0,10)+'.json';a.click();showToast('Exported');
  };
  document.getElementById('searchInput').oninput=e=>{searchQuery=e.target.value;renderCards();};
  document.getElementById('sortSelect').onchange=e=>{sortMode=e.target.value;renderCards();};
  document.getElementById('gridViewBtn').onclick=()=>{viewMode='grid';document.getElementById('cardGrid').classList.remove('list-view');document.getElementById('gridViewBtn').classList.add('active');document.getElementById('listViewBtn').classList.remove('active');renderCards();};
  document.getElementById('listViewBtn').onclick=()=>{viewMode='list';document.getElementById('cardGrid').classList.add('list-view');document.getElementById('listViewBtn').classList.add('active');document.getElementById('gridViewBtn').classList.remove('active');renderCards();};
  document.getElementById('addModal').onclick=e=>{if(e.target===document.getElementById('addModal'))closeModal();};
  document.querySelectorAll('.filter-btn').forEach(btn=>btn.onclick=()=>setFilter(btn.dataset.type,btn.dataset.filter));
  document.getElementById('importFile').onchange=async e=>{
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=async ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(Array.isArray(data)){
          const name=currentUser.user_metadata?.full_name||currentUser.email.split('@')[0];
          const rows=data.map(d=>({...d,id:uid(),added_by:currentUser.email,added_by_name:name,created_at:new Date().toISOString()}));
          const{error}=await sb.from('items').insert(rows);
          if(error)showToast('Import error: '+error.message);
          else{await fetchItems();showToast('Imported '+rows.length+' items');}
        }
      }catch{showToast('Invalid JSON file');}
      e.target.value='';
    };r.readAsText(file);
  };
}

/* BOOT */
(async()=>{
  const{data:{session}}=await sb.auth.getSession();
  if(session)await initApp(session.user);
  sb.auth.onAuthStateChange(async(_,session)=>{if(session&&!currentUser)await initApp(session.user);});
  document.getElementById('authEmail').onkeydown=e=>{if(e.key==='Enter')handleAuth();};
  document.getElementById('authPassword').onkeydown=e=>{if(e.key==='Enter')handleAuth();};
})();
</script>
